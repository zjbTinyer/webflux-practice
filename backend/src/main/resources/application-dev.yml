# ============================================================================
# Dev Profile — 使用 H2 内存数据库，无需 Docker
# 启动: mvn spring-boot:run
# ============================================================================
spring:
  r2dbc:
    url: r2dbc:h2:mem:///webfluxdb;DB_CLOSE_DELAY=-1
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    locations: classpath:db/migration/h2
