# ============================================================================
# WebFlux 项目 — 通用配置（所有 profile 共享）
# ============================================================================

server:
  port: 8080

spring:
  # ========== 禁用 spring.sql.init（改用 Flyway） ==========
  sql:
    init:
      mode: never

  # ========== Flyway 迁移（默认启用，test profile 关闭） ==========
  flyway:
    enabled: true

# ========== Actuator 健康检查 ==========
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,env,loggers
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ========== SpringDoc OpenAPI (Swagger UI) ==========
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    groups-order: ASC
  show-actuator: true
  group-configs:
    - group: api
      paths-to-match: /api/users/**, /api/func/**
    - group: demo
      paths-to-match: /api/demo/**

# ========== 日志 ==========
logging:
  level:
    com.example.webflux: DEBUG
    org.springframework.r2dbc: DEBUG
    reactor: INFO
